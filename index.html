<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Corporativo | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="ph ph-cpu"></i>
                <h2>360 Stock</h2>
            </div>
            <nav>
                <a href="#" class="active"><i class="ph ph-squares-four"></i> Dashboard</a>
                <a href="#"><i class="ph ph-microchip"></i> Componentes</a>
                <a href="#"><i class="ph ph-factory"></i> Produção (BOM)</a>
                <a href="#"><i class="ph ph-airplane-tilt"></i> Importações</a>
            </nav>
            <div class="user-profile">
                <div class="avatar">L</div>
                <div class="info">
                    <span>Lucas (CEO)</span>
                    <small>Equipe c/ Vanderson</small>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1>Visão Geral da Operação</h1>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-secondary" onclick="abrirModalCompra()"><i class="ph ph-airplane-tilt"></i> Nova Importação</button>
                    <button class="btn-primary" onclick="abrirModal()"><i class="ph ph-plus"></i> Novo Item</button>
                </div>
            </header>

            <section class="summary-cards">
                <div class="card">
                    <div class="card-icon"><i class="ph ph-box-arrow-down"></i></div>
                    <div class="card-info">
                        <h3>Itens em Estoque</h3>
                        <h2 id="total-items">0</h2>
                    </div>
                </div>
                <div class="card alert">
                    <div class="card-icon"><i class="ph ph-warning-circle"></i></div>
                    <div class="card-info">
                        <h3>Estoque Crítico</h3>
                        <h2 id="critical-items">0</h2>
                    </div>
                </div>
            </section>

            <section class="data-section">
                <h2>Inventário Atual</h2>
                <div class="table-container">
                    <table id="products-table">
                        <thead>
                            <tr>
                                <th>Foto</th>
                                <th>SKU</th>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Estoque</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
<div id="modal-novo-item" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cadastrar Novo Item</h2>
                <button onclick="fecharModal()" class="btn-close"><i class="ph ph-x"></i></button>
            </div>
            
            <form id="form-produto" onsubmit="salvarProduto(event)">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Nome do Item</label>
                        <input type="text" id="nome" placeholder="Ex: Sensor TCS34725" required>
                    </div>
                    <div class="input-group">
                        <label>SKU / Código</label>
                        <input type="text" id="sku" placeholder="Ex: SEN-TCS-001" required>
                    </div>
                    <div class="input-group">
                        <label>Categoria</label>
                        <select id="categoria" required>
                            <option value="Componente">Componente (Eletrônica)</option>
                            <option value="Microcontrolador">Microcontrolador (ESP/Arduino)</option>
                            <option value="Usinagem">Usinagem / Impressão 3D</option>
                            <option value="Placa Pronta">Placa Pronta (Produto Final)</option>
                            <option value="Fio/Cabo">Fios e Cabos</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Tipo de Item</label>
                        <select id="is_manufactured">
                            <option value="0">Matéria Prima (Eu Compro)</option>
                            <option value="1">Produto Final (Eu Fabrico)</option>
                        </select>
                    </div>
                    <div class="input-group" style="grid-column: span 2;">
                        <label>Foto do Produto</label>
                        <input type="file" id="foto" accept="image/*">
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar no Estoque</button>
                </div>
            </form>
        </div>
    </div>
    <div id="modal-nova-compra" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Registrar Compra (Importação/Local)</h2>
                <button onclick="fecharModalCompra()" class="btn-close"><i class="ph ph-x"></i></button>
            </div>
            
            <form id="form-compra" onsubmit="salvarCompra(event)">
                <div class="form-grid">
                    <div class="input-group" style="grid-column: span 2;">
                        <label>Item Comprado</label>
                        <select id="compra_produto_id" required>
                            <option value="">Carregando produtos...</option>
                            </select>
                    </div>
                    <div class="input-group">
                        <label>Quantidade Solicitada</label>
                        <input type="number" id="compra_quantidade" min="1" placeholder="Ex: 50" required>
                    </div>
                    <div class="input-group">
                        <label>Previsão de Chegada</label>
                        <input type="date" id="compra_previsao" required>
                    </div>
                    <div class="input-group" style="grid-column: span 2;">
                        <label>Prioridade da Carga</label>
                        <select id="compra_prioridade" required>
                            <option value="Baixa">Baixa (Pode atrasar)</option>
                            <option value="Média" selected>Média (Normal)</option>
                            <option value="Alta">Alta (Estoque ficando baixo)</option>
                            <option value="Crítica">Crítica (Risco de parar a produção)</option>
                        </select>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="fecharModalCompra()">Cancelar</button>
                    <button type="submit" class="btn-primary">Registrar Pedido</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
